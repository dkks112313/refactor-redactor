name: .NET

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore WindowsFormsApp6.sln

    - name: Build
      run: dotnet build WindowsFormsApp6.sln --no-restore --configuration Release

    - name: Test
      run: dotnet test UnitTest/UnitTest.csproj --no-build
